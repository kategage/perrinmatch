  <path d="M38 44 L38 48" opacity="0.3"/>
  <path d="M28 50 L32 52" opacity="0.3"/>
  <path d="M48 50 L44 52" opacity="0.3"/>
  <path d="M30 64 L33 62" opacity="0.3"/>
  <path d="M46 64 L43 62" opacity="0.3"/>
  <!-- radiating lines in iris right -->
  <path d="M82 44 L82 48" opacity="0.3"/>
  <path d="M72 50 L76 52" opacity="0.3"/>
  <path d="M92 50 L88 52" opacity="0.3"/>
  <path d="M74 64 L77 62" opacity="0.3"/>
  <path d="M90 64 L87 62" opacity="0.3"/>
  <!-- brow ridge -->
  <path d="M16 40 Q28 32 42 36" stroke-width="2.5"/>
  <path d="M104 40 Q92 32 78 36" stroke-width="2.5"/>
