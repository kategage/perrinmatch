<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- left facial disc -->
  <circle cx="38" cy="58" r="22"/>
  <!-- right facial disc -->
  <circle cx="82" cy="58" r="22"/>
  <!-- left iris -->
  <circle cx="38" cy="58" r="14"/>
  <!-- right iris -->
  <circle cx="82" cy="58" r="14"/>
  <!-- left pupil -->
  <circle cx="38" cy="58" r="7" fill="#1a1a1a" stroke="none"/>
  <!-- right pupil -->
  <circle cx="82" cy="58" r="7" fill="#1a1a1a" stroke="none"/>
  <!-- left highlight -->
  <circle cx="34" cy="54" r="3" fill="#ffffff" stroke="none"/>
  <!-- right highlight -->
  <circle cx="78" cy="54" r="3" fill="#ffffff" stroke="none"/>
