  <circle cx="31" cy="34" r="2.5" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="34" cy="44" r="2.5" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="40" cy="54" r="2.5" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="48" cy="62" r="2.5" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="56" cy="68" r="2.5" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="66" cy="68" r="2.5" fill="#1a1a1a" opacity="0.15"/>
  <circle cx="76" cy="62" r="2" fill="#1a1a1a" opacity="0.15"/>
