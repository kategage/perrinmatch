  <circle cx="42" cy="78" r="1.5" fill="#1a1a1a" opacity="0.12"/>

  <!-- third tentacle tip -->
  <path d="M85 90 Q92 82 94 72 Q96 62 90 58" stroke-width="1.5"/>
  <circle cx="88" cy="86" r="1.5" fill="#1a1a1a" opacity="0.12"/>
