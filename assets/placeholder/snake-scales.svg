  <path d="M10 40 Q20 30 30 40"/>
  <path d="M30 40 Q40 30 50 40"/>
  <path d="M50 40 Q60 30 70 40"/>
  <path d="M70 40 Q80 30 90 40"/>
  <path d="M90 40 Q100 30 110 40"/>
  <!-- row 3 -->
  <path d="M20 55 Q30 45 40 55"/>
  <path d="M40 55 Q50 45 60 55"/>
  <path d="M60 55 Q70 45 80 55"/>
  <path d="M80 55 Q90 45 100 55"/>
  <!-- row 4 offset -->
  <path d="M10 70 Q20 60 30 70"/>
  <path d="M30 70 Q40 60 50 70"/>
  <path d="M50 70 Q60 60 70 70"/>
  <path d="M70 70 Q80 60 90 70"/>
  <path d="M90 70 Q100 60 110 70"/>
  <!-- row 5 -->
  <path d="M20 85 Q30 75 40 85"/>
  <path d="M40 85 Q50 75 60 85"/>
  <path d="M60 85 Q70 75 80 85"/>
  <path d="M80 85 Q90 75 100 85"/>
  <!-- row 6 offset -->
  <path d="M10 100 Q20 90 30 100"/>
