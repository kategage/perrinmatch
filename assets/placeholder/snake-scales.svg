  <path d="M50 100 Q60 90 70 100"/>
  <path d="M70 100 Q80 90 90 100"/>
  <path d="M90 100 Q100 90 110 100"/>
  <!-- diamond accents -->
  <path d="M50 32 L53 35 L50 38 L47 35 Z" fill="#1a1a1a" opacity="0.15"/>
  <path d="M70 62 L73 65 L70 68 L67 65 Z" fill="#1a1a1a" opacity="0.15"/>
  <path d="M40 77 L43 80 L40 83 L37 80 Z" fill="#1a1a1a" opacity="0.15"/>
  <path d="M80 47 L83 50 L80 53 L77 50 Z" fill="#1a1a1a" opacity="0.15"/>
